name: TWS CI workflows

on:
    push:

jobs:
    build-and-push: 
        runs-on: ubuntu-latest # github runner (free)
        steps:
            - name: Checkout code 
              uses: actions/checkout@v4 # clonce the code ubuntu runner 
          
            - name: setup docker
              uses: docker/setup-buildx-action@v4 
             
            - name: Login to Docker Hub # To authenticate   
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }} 
                password: ${{ secrets.DOCKERHUB_TOKEN }}
       
            - name: Build and Push 
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags:  ${{ secrets.DOCKERHUB_USERNAME }}/skillplus-backend:live
