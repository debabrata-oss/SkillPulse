<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SkillPulse — CI/CD &amp; Runtime Architecture</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#64748b">Push → Build → Push to Docker Hub → SSH Deploy → Run on Server</text>

  <!-- ===== TOP ROW: CI/CD PIPELINE ===== -->
  <text x="40" y="92" font-size="14" font-weight="700" fill="#1e40af">① CI/CD PIPELINE</text>

  <!-- Developer -->
  <g>
    <rect x="40" y="105" width="140" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="110" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Developer</text>
    <text x="110" y="152" text-anchor="middle" font-size="11" fill="#475569">git push</text>
    <text x="110" y="168" text-anchor="middle" font-size="11" fill="#475569">main branch</text>
  </g>

  <!-- GitHub Repo -->
  <g>
    <rect x="220" y="105" width="160" height="80" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
    <text x="300" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">GitHub Repo</text>
    <text x="300" y="152" text-anchor="middle" font-size="11" fill="#475569">debabrata-oss/</text>
    <text x="300" y="168" text-anchor="middle" font-size="11" fill="#475569">SkillPulse</text>
  </g>

  <!-- CI Workflow -->
  <g>
    <rect x="420" y="95" width="200" height="100" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="520" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">CI: ci.yml</text>
    <text x="520" y="138" text-anchor="middle" font-size="11" fill="#334155">checkout → buildx</text>
    <text x="520" y="154" text-anchor="middle" font-size="11" fill="#334155">login DockerHub</text>
    <text x="520" y="170" text-anchor="middle" font-size="11" fill="#334155">build ./backend</text>
    <text x="520" y="186" text-anchor="middle" font-size="11" fill="#334155">push :live tag</text>
  </g>

  <!-- Docker Hub -->
  <g>
    <rect x="660" y="105" width="160" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="740" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Docker Hub</text>
    <text x="740" y="152" text-anchor="middle" font-size="11" fill="#475569">trainwithdpuhan/</text>
    <text x="740" y="168" text-anchor="middle" font-size="11" fill="#475569">skillplus-backend:live</text>
  </g>

  <!-- CD Workflow -->
  <g>
    <rect x="860" y="95" width="200" height="100" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="960" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">CD: cd.yml</text>
    <text x="960" y="138" text-anchor="middle" font-size="11" fill="#334155">on: workflow_run</text>
    <text x="960" y="154" text-anchor="middle" font-size="11" fill="#334155">SSH to server</text>
    <text x="960" y="170" text-anchor="middle" font-size="11" fill="#334155">git pull + compose</text>
    <text x="960" y="186" text-anchor="middle" font-size="11" fill="#334155">pull + up -d</text>
  </g>

  <!-- Arrows top row -->
  <line x1="180" y1="145" x2="218" y2="145" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="380" y1="145" x2="418" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="145" x2="658" y2="145" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="820" y1="145" x2="858" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Trigger label -->
  <text x="740" y="220" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">CI success triggers CD</text>
  <path d="M 520 195 Q 520 225 740 225 Q 960 225 960 195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- Divider -->
  <line x1="40" y1="260" x2="1060" y2="260" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ===== BOTTOM ROW: SERVER RUNTIME ===== -->
  <text x="40" y="290" font-size="14" font-weight="700" fill="#1e40af">② RUNTIME (on remote server, started by docker compose up -d)</text>

  <!-- User browser -->
  <g>
    <rect x="40" y="310" width="140" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="110" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">End User</text>
    <text x="110" y="358" text-anchor="middle" font-size="11" fill="#475569">Web browser</text>
    <text x="110" y="374" text-anchor="middle" font-size="11" fill="#475569">http://server</text>
  </g>

  <!-- Server / docker network box -->
  <g>
    <rect x="220" y="290" width="840" height="430" rx="14" fill="#fafafa" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="240" y="312" font-size="12" font-weight="700" fill="#475569">Remote Server (docker-compose network)</text>

    <!-- Nginx container -->
    <g>
      <rect x="250" y="330" width="200" height="170" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="350" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">nginx:alpine</text>
      <text x="350" y="374" text-anchor="middle" font-size="11" fill="#475569">port 80 → host</text>
      <line x1="270" y1="384" x2="430" y2="384" stroke="#cbd5e1" stroke-width="1"/>
      <text x="350" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">serves /</text>
      <text x="350" y="420" text-anchor="middle" font-size="10" fill="#64748b">/usr/share/nginx/html</text>
      <text x="350" y="436" text-anchor="middle" font-size="10" fill="#64748b">(./frontend mount)</text>
      <text x="350" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">proxies /api/</text>
      <text x="350" y="476" text-anchor="middle" font-size="10" fill="#64748b">→ backend:8080</text>
      <text x="350" y="492" text-anchor="middle" font-size="10" fill="#64748b">also /health</text>
    </g>

    <!-- Backend container -->
    <g>
      <rect x="500" y="330" width="220" height="170" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="610" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">backend (Go + Gin)</text>
      <text x="610" y="374" text-anchor="middle" font-size="11" fill="#475569">port 8080 (internal)</text>
      <line x1="520" y1="384" x2="700" y2="384" stroke="#fcd34d" stroke-width="1"/>
      <text x="610" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">REST API</text>
      <text x="610" y="420" text-anchor="middle" font-size="10" fill="#64748b">GET/POST /api/skills</text>
      <text x="610" y="434" text-anchor="middle" font-size="10" fill="#64748b">GET /api/skills/:id</text>
      <text x="610" y="448" text-anchor="middle" font-size="10" fill="#64748b">DELETE /api/skills/:id</text>
      <text x="610" y="462" text-anchor="middle" font-size="10" fill="#64748b">POST /api/skills/:id/log</text>
      <text x="610" y="476" text-anchor="middle" font-size="10" fill="#64748b">GET /api/dashboard</text>
      <text x="610" y="490" text-anchor="middle" font-size="10" fill="#64748b">GET /health</text>
    </g>

    <!-- DB container -->
    <g>
      <rect x="770" y="330" width="220" height="170" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
      <text x="880" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">mysql:8.4</text>
      <text x="880" y="374" text-anchor="middle" font-size="11" fill="#475569">port 3306</text>
      <line x1="790" y1="384" x2="970" y2="384" stroke="#c4b5fd" stroke-width="1"/>
      <text x="880" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">database: skillpulse</text>
      <text x="880" y="424" text-anchor="middle" font-size="10" fill="#64748b">tables:</text>
      <text x="880" y="440" text-anchor="middle" font-size="10" fill="#64748b">• skills</text>
      <text x="880" y="456" text-anchor="middle" font-size="10" fill="#64748b">• learning_logs</text>
      <text x="880" y="478" text-anchor="middle" font-size="10" fill="#64748b">healthcheck: mysqladmin ping</text>
      <text x="880" y="492" text-anchor="middle" font-size="10" fill="#64748b">volume: mysql_data</text>
    </g>

    <!-- Mounts / volumes section -->
    <g>
      <rect x="250" y="540" width="740" height="160" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="270" y="562" font-size="12" font-weight="700" fill="#475569">Volumes &amp; Config (host → containers)</text>

      <rect x="270" y="578" width="220" height="105" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="380" y="598" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">./frontend (read-only)</text>
      <text x="380" y="616" text-anchor="middle" font-size="10" fill="#64748b">index.html, css/, js/</text>
      <text x="380" y="632" text-anchor="middle" font-size="10" fill="#64748b">→ nginx:/usr/share/nginx/html</text>
      <text x="380" y="654" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">./nginx/nginx.conf</text>
      <text x="380" y="670" text-anchor="middle" font-size="10" fill="#64748b">→ /etc/nginx/conf.d/default.conf</text>

      <rect x="510" y="578" width="220" height="105" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="620" y="598" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">./mysql/init.sql</text>
      <text x="620" y="616" text-anchor="middle" font-size="10" fill="#64748b">→ /docker-entrypoint-initdb.d/</text>
      <text x="620" y="630" text-anchor="middle" font-size="10" fill="#64748b">runs on first boot</text>
      <text x="620" y="654" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">mysql_data (named volume)</text>
      <text x="620" y="670" text-anchor="middle" font-size="10" fill="#64748b">→ /var/lib/mysql (persistent)</text>

      <rect x="750" y="578" width="220" height="105" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="860" y="598" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">.env (on server)</text>
      <text x="860" y="616" text-anchor="middle" font-size="10" fill="#64748b">DOCKERHUB_USERNAME</text>
      <text x="860" y="630" text-anchor="middle" font-size="10" fill="#64748b">DB_NAME / DB_USER / DB_PASSWORD</text>
      <text x="860" y="644" text-anchor="middle" font-size="10" fill="#64748b">MYSQL_ROOT_PASSWORD</text>
      <text x="860" y="668" text-anchor="middle" font-size="10" fill="#64748b">read by docker compose</text>
    </g>
  </g>

  <!-- Browser → nginx arrow -->
  <line x1="180" y1="350" x2="248" y2="380" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="190" y="338" font-size="10" fill="#2563eb" font-weight="600">HTTP :80</text>

  <!-- nginx → backend -->
  <line x1="450" y1="430" x2="498" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="474" y="420" text-anchor="middle" font-size="10" fill="#475569">/api/*</text>

  <!-- backend → db -->
  <line x1="720" y1="430" x2="768" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="744" y="420" text-anchor="middle" font-size="10" fill="#475569">SQL</text>

  <!-- Docker Hub → backend pull (cross-section) -->
  <path d="M 740 195 Q 740 250 610 320" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="690" y="248" font-size="10" fill="#16a34a" font-weight="600" font-style="italic">image pulled at deploy</text>
</svg>
